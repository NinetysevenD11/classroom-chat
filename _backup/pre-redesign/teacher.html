<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리반 채팅 · 교사 화면</title>
  <link rel="stylesheet" href="/css/teacher.css" />
</head>
<body>
  <header class="topbar">
    <h1>🏫 우리반 칠판</h1>
    <div class="hint">아바타를 <b>클릭</b>하면 마지막 채팅을 분필로 읽어줍니다 🔊</div>
    <button id="kickAllBtn" class="danger-btn" title="모든 학생을 한 번에 내보내기">전체 강퇴</button>
    <button id="themeBtn" class="icon-btn" title="칠판/밝은 칠판 전환">🌙</button>
    <button id="pipBtn" class="float-btn" title="PPT 위에 떠 있는 작은 창으로 보기">🪟 플로팅 창</button>
    <button id="qrBtn" class="qr-btn">📱 참여 QR 코드</button>
    <button id="logoutBtn" class="icon-btn" title="로그아웃">🚪</button>
  </header>

  <!-- 도구 모음: 채팅 초기화 + 타이머 -->
  <div class="toolbar">
    <button id="resetChatsBtn" class="tool-btn" title="교사 화면의 모든 채팅을 지웁니다(학생 폰은 그대로)">🧹 채팅 초기화</button>

    <div class="question-box">
      <span class="question-label">❓ 전체 질문</span>
      <input id="questionInput" type="text" placeholder="화면 중앙에 모두에게 보이는 질문" maxlength="300" autocomplete="off" />
      <button type="button" id="questionSend" class="tool-btn green">보내기</button>
      <button type="button" id="questionClear" class="tool-btn">지우기</button>
    </div>

    <div class="timer-box">
      <span class="timer-label">⏱ 타이머</span>
      <input id="timerMin" type="number" min="0" max="180" value="5" /> 분
      <input id="timerSec" type="number" min="0" max="59" value="0" /> 초
      <button id="timerStart" class="tool-btn green">시작</button>
      <button id="timerStop" class="tool-btn">정지</button>
      <button id="timerReset" class="tool-btn">리셋</button>
      <span id="timerDisplay" class="timer-display">05:00</span>
    </div>
  </div>

  <main id="grid" class="grid"></main>

  <!-- 화면 중앙 전체 질문 -->
  <div id="questionOverlay" class="question-overlay hidden">
    <div class="question-card">
      <button type="button" id="questionClose" class="question-close" title="질문 끄기">✕</button>
      <div class="question-card-head">❓ 선생님 질문</div>
      <div id="questionText" class="question-text"></div>
      <button type="button" id="questionCloseBtn" class="question-close-btn">질문 끄기</button>
    </div>
  </div>

  <!-- 프로필 사진 선택 (모달 밖에 두어야 📷 버튼이 항상 동작함) -->
  <input type="file" id="panelPhotoInput" accept="image/*" hidden />

  <form id="teacherChatForm" class="teacher-chat">
    <span class="tc-label">👩‍🏫 선생님</span>
    <input id="teacherChatInput" type="text" placeholder="칠판에 쓸 선생님 메시지" maxlength="200" autocomplete="off" />
    <button type="submit">보내기</button>
  </form>

  <!-- 학생 패널: 채팅 로그 / 수정 / DM -->
  <div id="studentPanel" class="modal hidden">
    <div class="panel-box">
      <div class="panel-head">
        <h2 id="panelTitle">학생</h2>
        <button id="panelClose" class="panel-x">✕</button>
      </div>
      <div class="panel-section-title">프로필 사진 (📷 버튼으로도 설정)</div>
      <div class="panel-photo">
        <div id="panelPhotoPreview" class="panel-photo-preview">
          <span id="panelPhotoEmoji" class="panel-photo-emoji">🙂</span>
          <img id="panelPhotoImg" class="hidden" alt="프로필 미리보기" />
        </div>
        <div class="panel-photo-actions">
          <button type="button" id="panelPhotoPick" class="tool-btn">📷 사진 선택</button>
          <button type="button" id="panelPhotoClear" class="tool-btn">🔄 캐릭터로</button>
        </div>
      </div>
      <div class="panel-section-title">채팅 기록 (✏️ 수정 · 🔊 읽기)</div>
      <div id="panelLog" class="panel-log"></div>
      <form id="dmForm" class="dm-form">
        <span class="dm-label"><span class="icon-paper-plane" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path d="M3.4 20.4l17.45-7.17c.81-.35.81-1.49 0-1.84L3.4 4.6c-.66-.29-1.39.2-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.89c-.5.07-.87.5-.87 1l.01 3.61c0 .71.73 1.2 1.39.91z"/></svg></span> DM</span>
        <input id="dmInput" type="text" placeholder="이 학생에게만 보낼 메시지" maxlength="200" autocomplete="off" />
        <button type="submit">보내기</button>
      </form>
    </div>
  </div>

  <!-- 타이머 종료 알람 -->
  <div id="alarmOverlay" class="modal hidden">
    <div class="alarm-box">
      <div class="alarm-emoji">⏰</div>
      <h2>시간 종료!</h2>
      <button id="alarmStop" class="close-btn">알람 끄기</button>
    </div>
  </div>

  <!-- QR 모달 -->
  <div id="qrModal" class="modal hidden">
    <div class="modal-box">
      <h2>학생 참여 QR 코드</h2>
      <p>학생들이 휴대폰으로 스캔하면 참여할 수 있어요.</p>
      <img id="qrImg" alt="QR 코드" />
      <p class="qr-url" id="qrUrl"></p>
      <button id="qrClose" class="close-btn">닫기</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/teacher.js"></script>
</body>
</html>
