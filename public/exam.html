<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>시험 응시</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/cozy-meadow.css?v=2" />
  <link rel="stylesheet" href="/css/user-background.css?v=1" />
  <link rel="stylesheet" href="/css/exam.css?v=4" />
  <link rel="stylesheet" href="/css/exam-cozy.css?v=2" />
  <script src="/js/user-background.js?v=1"></script>
</head>
<body>
  <section id="joinView" class="view join-view">
    <div class="join-card">
      <h1>📝 시험 응시</h1>
      <p>이름과 자리 번호(비밀번호)를 입력하세요</p>
      <input id="examName" type="text" placeholder="이름" maxlength="12" autocomplete="name" />
      <input id="examPin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="번호 (1~19)" autocomplete="off" />
      <button type="button" id="examJoinBtn" class="btn-primary">입장</button>
      <p id="examJoinError" class="error"></p>
    </div>
  </section>

  <section id="examView" class="view exam-view" hidden>
    <header class="exam-topbar">
      <div>
        <div id="examStudentLabel" class="student-label"></div>
        <div id="examUnitTitle" class="unit-title"></div>
      </div>
      <button type="button" id="examBackBtn" class="btn-text">← 목록</button>
    </header>

    <div id="unitPicker" class="unit-picker"></div>

    <div id="examWorkspace" class="exam-workspace hidden">
      <div class="split-pane">
        <div class="pane pane-paper">
          <div class="pane-head">
            <h2 class="pane-title">시험지</h2>
            <div class="paper-zoom-controls" aria-label="시험지 확대·축소">
              <button type="button" id="paperZoomOut" class="paper-zoom-btn" title="축소">−</button>
              <span id="paperZoomLabel" class="paper-zoom-label">100%</span>
              <button type="button" id="paperZoomIn" class="paper-zoom-btn" title="확대">+</button>
              <button type="button" id="paperZoomReset" class="paper-zoom-btn paper-zoom-reset" title="원래 크기">맞춤</button>
            </div>
          </div>
          <div id="examPaper" class="paper-scroll" tabindex="0"></div>
        </div>
        <div class="pane pane-answers">
          <h2 class="pane-title">답안 작성</h2>
          <div id="examAnswers" class="answers-scroll"></div>
        </div>
      </div>
      <footer class="submit-bar">
        <button type="button" id="examSubmitBtn" class="btn-submit">제출하기</button>
      </footer>
    </div>
  </section>

  <div id="submitModal" class="modal hidden">
    <div class="modal-box">
      <p id="submitModalText"></p>
      <button type="button" id="submitModalOk" class="btn-primary">확인</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/exam.js?v=6"></script>
</body>
</html>
