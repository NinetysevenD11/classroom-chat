# Render — classroom-chat-h1ll.onrender.com
# Node 런타임 + 빌드 시 Python 자동 설치(postinstall)
# Docker 전환 시 루트 Dockerfile 사용 가능

services:
  - type: web
    name: classroom-chat
    runtime: node
    plan: standard
    region: singapore
    branch: main
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLASSROOM_INTEGRATED
        value: "1"
      - key: LESSON_PORT
        value: "18080"
      - key: DATA_DIR
        value: /data
      - key: LESSON_PERSIST_DIR
        value: /data/lesson-data
    disk:
      name: classroom-data
      mountPath: /data
      sizeGB: 2
