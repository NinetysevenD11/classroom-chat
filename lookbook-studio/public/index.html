<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lookbook Studio — AI 패션 릴스</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <p class="eyebrow">AI Fashion Reels</p>
        <h1>Lookbook Studio</h1>
        <p class="subtitle">스타일과 옷 설명만 입력하면 9:16 릴스 영상을 만들어 드립니다.</p>
      </div>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <h2>룩북 설정</h2>

        <label class="field">
          <span>스타일</span>
          <div class="style-grid" id="styleGrid">
            <button type="button" class="style-btn active" data-style="minimal">미니멀</button>
            <button type="button" class="style-btn" data-style="streetwear">스트릿</button>
            <button type="button" class="style-btn" data-style="luxury">럭셔리</button>
            <button type="button" class="style-btn" data-style="casual">캐주얼</button>
            <button type="button" class="style-btn" data-style="sporty">스포티</button>
          </div>
        </label>

        <label class="field">
          <span>옷 / 컨셉 설명</span>
          <textarea
            id="themeInput"
            rows="3"
            placeholder="예: 오versized 베이지 코트, 화이트 터틀넥, 와이드 슬랙스, 블랙 로퍼"
          ></textarea>
        </label>

        <label class="field">
          <span>장면 수 <strong id="sceneLabel">4</strong>컷</span>
          <input type="range" id="sceneCount" min="2" max="6" value="4" />
        </label>

        <button type="button" class="primary" id="generateBtn">룩북 영상 만들기</button>

        <div class="note">
          <p>무료 AI 이미지 API(Pollinations)를 사용합니다. 생성에 2~5분 걸릴 수 있습니다.</p>
          <p>더 높은 품질이 필요하면 Replicate·Midjourney 등 유료 API 연동도 가능합니다.</p>
        </div>
      </section>

      <section class="panel result-panel">
        <h2>결과</h2>

        <div class="progress-wrap hidden" id="progressWrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <p class="progress-text" id="progressText">준비 중…</p>
        </div>

        <div class="empty-state" id="emptyState">
          <div class="phone-mock">
            <span>9:16</span>
            <p>생성된 릴스가 여기에 표시됩니다</p>
          </div>
        </div>

        <div class="result hidden" id="resultWrap">
          <div class="video-wrap">
            <video id="resultVideo" controls playsinline></video>
          </div>
          <a class="download-btn" id="downloadBtn" download="lookbook_reel.mp4">MP4 다운로드</a>
          <div class="gallery" id="gallery"></div>
        </div>

        <p class="error hidden" id="errorText"></p>
      </section>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
