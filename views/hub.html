<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교실 도구함</title>
  <link rel="stylesheet" href="/css/cozy-meadow.css?v=3" />
  <link rel="stylesheet" href="/css/user-background.css?v=1" />
  <link rel="stylesheet" href="/css/hub.css?v=13" />
  <script src="/js/user-background.js?v=1"></script>
  <script>
    (function () {
      var t = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
    })();
  </script>
</head>
<body class="hub-layout">
  <main class="hub-main">
    <iframe
      id="appFrame"
      class="hub-frame"
      src="/app/chalkboard"
      title="우리반 칠판"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </main>

  <button type="button" id="hubMenuBackdrop" class="hub-menu-backdrop" hidden aria-label="메뉴 닫기"></button>

  <div class="hub-fab-stack">
    <div id="hubAppMenu" class="hub-app-menu" hidden aria-label="앱 선택"></div>
    <button
      type="button"
      id="hubMenuFab"
      class="hub-menu-fab"
      aria-label="앱 메뉴 열기"
      aria-expanded="false"
      aria-controls="hubAppMenu"
    >
      <span class="hub-menu-fab-icon" aria-hidden="true">☰</span>
    </button>
  </div>

  <script src="/js/hub.js?v=11"></script>
</body>
</html>
