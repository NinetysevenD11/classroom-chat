<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리반 칠판 · 관리자</title>
  <link rel="stylesheet" href="/css/admin.css?v=2" />
</head>
<body>
  <header class="admin-top">
    <h1>🛡️ 관리자</h1>
    <p class="admin-sub">선생님 비밀번호 · 명단 확인 · 탈퇴 처리</p>
    <div class="admin-actions">
      <button type="button" id="refreshBtn" class="btn secondary">새로고침</button>
      <button type="button" id="logoutBtn" class="btn secondary">로그아웃</button>
    </div>
  </header>

  <main class="admin-main">
    <p id="loadError" class="load-error hidden"></p>

    <section class="panel">
      <h2>선생님 계정 <span id="teacherCount" class="badge">0</span></h2>
      <p class="panel-hint" id="activeHint"></p>
      <div id="teacherList" class="teacher-list"></div>
    </section>

    <section class="panel">
      <h2>최근 로그인 기록</h2>
      <div class="table-wrap">
        <table class="log-table">
          <thead>
            <tr>
              <th>시간</th>
              <th>아이디</th>
              <th>구분</th>
            </tr>
          </thead>
          <tbody id="loginLogBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/admin.js?v=2"></script>
</body>
</html>
