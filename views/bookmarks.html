<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자주 가는 사이트</title>
  <script src="/js/hub-embed.js?v=1"></script>
  <link rel="stylesheet" href="/css/cozy-meadow.css?v=3" />
  <link rel="stylesheet" href="/css/user-background.css?v=1" />
  <link rel="stylesheet" href="/css/bookmarks.css?v=10" />
  <script src="/js/user-background.js?v=1"></script>
</head>
<body class="bookmarks-app">
  <div class="bookmarks-shell">
    <aside class="bookmarks-sidebar" aria-label="카테고리">
      <div class="bm-sidebar-head">
        <h2>📂 분류</h2>
        <div class="bm-sidebar-add-group" aria-label="분류 추가">
          <button type="button" class="btn-sidebar-add bm-add-major" id="addMajorBtn" title="대분류 추가">대</button>
          <button type="button" class="btn-sidebar-add bm-add-mid" id="addMidBtn" title="중분류 추가">중</button>
          <button type="button" class="btn-sidebar-add bm-add-minor" id="addMinorBtn" title="소분류 추가">소</button>
        </div>
      </div>
      <nav id="categoryList" class="bm-category-list" aria-label="대·중·소 분류 목록"></nav>
    </aside>

    <main class="bookmarks-main">
      <header class="bookmarks-head">
        <div class="bookmarks-head-text">
          <h1>⭐ 자주 가는 사이트</h1>
          <p class="bookmarks-sub" id="bookmarksSub">자주 쓰는 링크를 카드로 모아 두세요.</p>
        </div>
        <div class="bookmarks-head-tools">
          <label class="bm-search" for="bmSearch">
            <span class="bm-search-icon" aria-hidden="true">🔍</span>
            <input
              type="search"
              id="bmSearch"
              placeholder="이름·URL 검색"
              autocomplete="off"
              enterkeyhint="search"
              aria-label="이름 또는 URL로 검색"
            />
            <button type="button" class="bm-search-clear hidden" id="bmSearchClear" aria-label="검색 지우기">✕</button>
          </label>
          <button type="button" class="btn btn-add" id="addBookmarkBtn">+ 사이트 추가</button>
        </div>
      </header>

      <div id="bookmarkGrid" class="bookmark-grid" aria-live="polite"></div>
      <p id="bookmarkEmpty" class="bookmark-empty hidden">표시할 사이트가 없습니다.</p>
    </main>
  </div>

  <div id="bookmarkDialog" class="bm-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="bookmarkDialogTitle">
    <div class="bm-dialog-box">
      <h2 id="bookmarkDialogTitle">사이트 추가</h2>
      <form id="bookmarkForm" class="bm-form">
        <label class="bm-field">
          <span>사이트 이름 <em class="req">*</em></span>
          <input type="text" id="bmTitle" name="title" maxlength="80" required placeholder="예: 네이버" autocomplete="off" />
        </label>
        <label class="bm-field">
          <span>주소 (URL) <em class="req">*</em></span>
          <input type="url" id="bmUrl" name="url" maxlength="500" required placeholder="https://example.com" autocomplete="off" />
        </label>
        <label class="bm-field">
          <span>카테고리</span>
          <select id="bmCategory" name="categoryId" aria-label="카테고리 선택"></select>
        </label>
        <label class="bm-field">
          <span>간단한 설명</span>
          <textarea id="bmDesc" name="description" maxlength="200" rows="3" placeholder="이 사이트를 언제 쓰는지 적어 두세요 (선택)"></textarea>
        </label>
        <div class="bm-dialog-foot">
          <button type="button" class="btn btn-ghost" id="bmCancelBtn">취소</button>
          <button type="submit" class="btn btn-primary" id="bmSaveBtn">저장</button>
        </div>
      </form>
    </div>
  </div>

  <div id="categoryDialog" class="bm-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="categoryDialogTitle">
    <div class="bm-dialog-box">
      <h2 id="categoryDialogTitle">분류 추가</h2>
      <form id="categoryForm" class="bm-form">
        <label class="bm-field">
          <span>분류 단계</span>
          <select id="catLevel" aria-label="분류 단계">
            <option value="1">대분류</option>
            <option value="2">중분류</option>
            <option value="3">소분류</option>
          </select>
        </label>
        <label class="bm-field" id="catParentField">
          <span>상위 분류</span>
          <select id="catParent" aria-label="상위 분류"></select>
        </label>
        <label class="bm-field">
          <span>이름 <em class="req">*</em></span>
          <input type="text" id="catName" maxlength="40" required placeholder="예: 수업 자료" autocomplete="off" />
        </label>
        <div class="bm-dialog-foot">
          <button type="button" class="btn btn-ghost" id="catCancelBtn">취소</button>
          <button type="submit" class="btn btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <div id="bookmarkToast" class="bm-toast hidden" role="status"></div>

  <script src="/js/bookmarks.js?v=10"></script>
</body>
</html>
