<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선생님을 위한 채점도구</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/grading.css?v=7" />
</head>
<body class="grading-app">
  <div class="grading-shell">
    <aside class="grading-sidebar" aria-label="채점 도구 메뉴">
      <nav class="sb-main-nav" aria-label="주요 메뉴">
        <button type="button" class="sb-nav-btn" data-view="home">🏠 안내</button>
        <button type="button" class="sb-nav-btn" data-view="exam">📝 시험·정답</button>
        <button type="button" class="sb-nav-btn sb-nav-grades" data-view="grades">📊 실시간 성적</button>
      </nav>

      <section class="sb-block sb-qr-block">
        <h2 class="sb-title">학생 접속 QR코드</h2>
        <div class="sb-qr-preview">
          <img id="qrImageInline" class="sb-qr-img" alt="학생 시험 접속 QR" width="160" height="160" hidden />
          <p id="qrLoadStatus" class="sb-qr-status">QR 불러오는 중…</p>
        </div>
        <p id="qrUrlInline" class="sb-qr-url" title=""></p>
        <div class="sb-qr-actions">
          <button type="button" id="qrCopyBtn" class="btn btn-blue">주소복사</button>
          <button type="button" id="qrSaveBtn" class="btn btn-ghost">QR저장</button>
        </div>
      </section>

      <section class="sb-profile">
        <div class="sb-profile-text">
          <div id="profileEmail" class="sb-email">—</div>
          <div id="profileName" class="sb-name">선생님</div>
          <div id="profileSchool" class="sb-school">—</div>
        </div>
        <button type="button" id="gradingLogout" class="btn btn-logout">로그아웃</button>
      </section>

      <section class="sb-block">
        <h2 class="sb-title">📁 시험 관리</h2>
        <p class="sb-hint">초록 점 = 학생에게 공개. 시험지 업로드 시 AI가 정답을 채웁니다.</p>
        <ul id="subjectList" class="sb-list subject-list"></ul>
        <button type="button" id="addSubjectBtn" class="btn btn-wide btn-purple">+ 새 시험(과목) 추가</button>
      </section>

      <section class="sb-block">
        <h2 class="sb-title">🏫 학반 관리</h2>
        <ul id="classList" class="sb-list class-list"></ul>
        <button type="button" id="addClassBtn" class="btn btn-wide btn-muted">+ 반 추가</button>
      </section>

      <section class="sb-block">
        <h2 class="sb-title">🔒 학생화면 과목 잠금</h2>
        <ul id="lockList" class="sb-list lock-list"></ul>
      </section>

      <section class="sb-block sb-api-footer">
        <h2 class="sb-title">🔑 내 AI API 키</h2>
        <p class="sb-hint">로그인한 계정에만 저장됩니다. <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" class="sb-link">Gemini 키 발급</a></p>
        <label class="sb-api-label">
          <span>Gemini API 키 (권장)</span>
          <input type="password" id="geminiKeyInput" class="sb-api-input" placeholder="AIza..." autocomplete="off" spellcheck="false" />
        </label>
        <p id="geminiKeyStatus" class="sb-key-status"></p>
        <label class="sb-api-label">
          <span>OpenAI API 키 (선택)</span>
          <input type="password" id="openaiKeyInput" class="sb-api-input" placeholder="sk-..." autocomplete="off" spellcheck="false" />
        </label>
        <p id="openaiKeyStatus" class="sb-key-status"></p>
        <label class="sb-api-label">
          <span>우선 사용</span>
          <select id="aiProviderSelect" class="sb-select">
            <option value="gemini">Gemini (PDF·이미지)</option>
            <option value="openai">OpenAI (이미지)</option>
            <option value="auto">자동 (Gemini → OpenAI)</option>
          </select>
        </label>
        <div class="sb-api-actions">
          <button type="button" id="saveApiKeysBtn" class="btn btn-blue btn-wide">API 키 저장</button>
          <button type="button" id="clearApiKeysBtn" class="btn btn-ghost btn-wide">내 키 삭제</button>
        </div>
        <p id="apiKeyHint" class="sb-key-hint"></p>
      </section>
    </aside>

    <main class="grading-main" id="gradingMain"></main>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>
  <div id="aiOverlay" class="ai-overlay hidden" aria-live="polite">
    <div class="ai-overlay-card">
      <div class="ai-spinner"></div>
      <p id="aiOverlayText">AI가 시험지를 분석하는 중…</p>
    </div>
  </div>

  <div id="studentResultModal" class="g-dialog hidden" role="dialog" aria-modal="true">
    <div class="g-dialog-backdrop" data-close="studentResultModal"></div>
    <div class="g-dialog-panel g-dialog-panel-wide">
      <div class="g-dialog-head">
        <h3 id="studentResultTitle">학생 결과</h3>
        <button type="button" class="g-dialog-close" data-close="studentResultModal" aria-label="닫기">✕</button>
      </div>
      <div id="studentResultBody" class="g-dialog-body student-result-body"></div>
      <div class="g-dialog-foot">
        <button type="button" class="btn btn-print" id="studentResultPrint">인쇄</button>
        <button type="button" class="btn btn-blue" data-close="studentResultModal">닫기</button>
      </div>
    </div>
  </div>

  <div id="manualGradeModal" class="g-dialog hidden" role="dialog" aria-modal="true">
    <div class="g-dialog-backdrop" data-close="manualGradeModal"></div>
    <div class="g-dialog-panel g-dialog-panel-manual">
      <div class="g-dialog-head manual-grade-head">
        <div>
          <h3>서술형 수동채점</h3>
          <p id="manualGradeMeta" class="manual-grade-meta"></p>
        </div>
        <button type="button" class="g-dialog-close" data-close="manualGradeModal" aria-label="닫기">✕</button>
      </div>
      <div id="manualGradeBody" class="g-dialog-body manual-grade-body"></div>
      <div class="g-dialog-foot manual-grade-foot">
        <button type="button" class="btn btn-save-manual" id="manualGradeSave">저장</button>
        <button type="button" class="btn btn-ghost" data-close="manualGradeModal">닫기</button>
      </div>
    </div>
  </div>

  <div id="gradingDialog" class="g-dialog hidden" role="dialog" aria-modal="true">
    <div class="g-dialog-backdrop" data-close-dialog></div>
    <div class="g-dialog-panel">
      <div class="g-dialog-head">
        <h3 id="dialogTitle">입력</h3>
        <button type="button" class="g-dialog-close" data-close-dialog aria-label="닫기">✕</button>
      </div>
      <div id="dialogBody" class="g-dialog-body"></div>
      <div class="g-dialog-foot">
        <button type="button" class="btn btn-ghost g-dialog-cancel" data-close-dialog>취소</button>
        <button type="button" class="btn btn-blue" id="dialogConfirm">확인</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
  </script>
  <script src="/js/grading.js?v=9"></script>
</body>
</html>
