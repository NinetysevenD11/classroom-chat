<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선생님을 위한 채점도구</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/grading.css?v=1" />
</head>
<body class="grading-app">
  <div class="grading-shell">
    <aside class="grading-sidebar" aria-label="채점 도구 메뉴">
      <section class="sb-block">
        <h2 class="sb-title">학생 접속 QR코드</h2>
        <div class="sb-qr-actions">
          <button type="button" id="qrOpenBtn" class="btn btn-blue">열기</button>
          <button type="button" id="qrCopyBtn" class="btn btn-ghost">주소복사</button>
          <button type="button" id="qrSaveBtn" class="btn btn-ghost">QR코드저장</button>
        </div>
      </section>

      <section class="sb-profile">
        <div class="sb-profile-text">
          <div id="profileEmail" class="sb-email">—</div>
          <div id="profileName" class="sb-name">선생님</div>
          <div id="profileSchool" class="sb-school">—</div>
        </div>
        <button type="button" id="gradingLogout" class="btn btn-logout">로그아웃</button>
      </section>

      <section class="sb-block">
        <div class="sb-head-row">
          <h2 class="sb-title">📁 시험 관리</h2>
          <button type="button" class="btn btn-xs btn-board" disabled title="준비 중">공유 게시판</button>
        </div>
        <ul id="subjectList" class="sb-list subject-list"></ul>
        <button type="button" id="addExamBtn" class="btn btn-wide btn-purple">+ 새 시험 추가</button>
      </section>

      <section class="sb-block">
        <h2 class="sb-title">🏫 학반 관리</h2>
        <ul id="classList" class="sb-list class-list"></ul>
        <button type="button" id="addClassBtn" class="btn btn-wide btn-muted">+ 반 추가</button>
      </section>

      <section class="sb-block sb-block-grow">
        <h2 class="sb-title">🔒 학생화면 과목 잠금</h2>
        <ul id="lockList" class="sb-list lock-list"></ul>
      </section>
    </aside>

    <main class="grading-main" id="gradingMain">
      <!-- hub.js가 iframe으로 로드 — 각 뷰는 grading.js가 렌더 -->
    </main>
  </div>

  <div id="qrModal" class="modal hidden" role="dialog" aria-labelledby="qrModalTitle">
    <div class="modal-card qr-card">
      <div class="modal-head">
        <h3 id="qrModalTitle">학생 접속 QR</h3>
        <button type="button" class="modal-close" data-close="qrModal">✕</button>
      </div>
      <p class="qr-url" id="qrUrlText"></p>
      <img id="qrImage" alt="학생 접속 QR 코드" width="280" height="280" />
      <p class="qr-hint">학생은 QR 또는 주소로 <strong>/exam</strong> 에 접속해 시험에 응시합니다.</p>
    </div>
  </div>

  <script src="/js/grading.js?v=1"></script>
</body>
</html>
